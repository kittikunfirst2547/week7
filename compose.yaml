name: kittikun-lab07

secrets:
  db_root:
    file: ./.db_root.txt
  db_pass:
    file: ./.db_pass.txt

configs:
  nginx_conf:
    file: ./my-nginx.conf

volumes:
  db-storage:

networks:
  frontend-zone:
  backend-zone:

services:
  db-server:
    image: mysql:8.0
    container_name: ${MY_USERNAME}-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: appuser
      MYSQL_PASSWORD_FILE: /run/secrets/db_pass
    secrets:
      - db_root
      - db_pass
    volumes:
      - db-storage:/var/lib/mysql
      - ./seed-data.sql:/docker-entrypoint-initdb.d/seed-data.sql:ro
    networks:
      - backend-zone
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-api:
    image: php:8.2-fpm
    container_name: ${MY_USERNAME}-backend
    restart: unless-stopped
    volumes:
      - ./app:/var/www/html # Bind Mount
    secrets:
      - db_pass
    environment:
      MYSQL_DATABASE: ${DB_NAME}
    networks:
      - backend-zone
    depends_on:
      db-server:
        condition: service_healthy

  web-proxy:
    image: nginx:latest
    container_name: ${MY_USERNAME}-web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT}:80"
    configs:
      - source: nginx_conf
        target: /etc/nginx/nginx.conf
        mode: 0444 # Read-only ตามข้อกำหนด
    volumes:
      - ./app:/var/www/html:ro
    networks:
      - frontend-zone
      - backend-zone
    depends_on:
      - backend-api

  db-management:
    image: phpmyadmin:latest
    container_name: ${MY_USERNAME}-pma
    restart: unless-stopped
    ports:
      - "${PMA_PORT}:80"
    environment:
      PMA_HOST: ${MY_USERNAME}-db
      PMA_PORT: 3306
    networks:
      - frontend-zone
      - backend-zone
    depends_on:
      db-server:
        condition: service_healthy
